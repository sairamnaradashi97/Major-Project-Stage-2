{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snow Forecasting System</title>

    <link rel="stylesheet" type="text/css" href="{% static 'css/styles.css' %}">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url("{% static 'img/bg5.jpg' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
        }

        nav {
            width: 220px;
            background-color: rgba(30, 60, 90, 0.4);
            color: #fff;
            padding-top: 30px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        

        nav h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 8px;
            color:yellow;
        }

        nav ul {
            list-style: none;
            padding: 0;
            width: 100%;
        }

        nav ul li {
            width: 100%;
        }

        nav ul li a {
            display: block;
            padding: 12px 30px; /* Increased left padding to push links right */
            color: #fff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;  /* <-- This makes the text bold */
            transition: background 0.3s;
        }
        

        nav ul li a:hover,
        nav ul li a.active {
            background-color: #1abc9c;
            border-left: 4px solid #fff;
        }
        



    </style>
</head>
<body>

<nav>
    <h1> Customer’s Purchasing</h1>
    <ul>
        <li><a href="{% url 'UserHome' %}">Home</a></li>
        <li><a href="{% url 'train_model' %}">Training</a></li>
        <li><a href="{% url 'predict' %}">Prediction</a></li>
        <li><a href="{% url 'index' %}">Logout</a></li>
    </ul>
</nav>

<div class="main-content">
    {% block contents %}
    {% endblock %}
</div>

</body>
</html>
